<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>無人機 Minecraft 世界探索 - 觀景塔版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; color: white; }
        canvas { display: block; }
        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0, 0, 0, 0.92); z-index: 50; backdrop-filter: blur(10px);
        }
        .panel {
            background: rgba(15, 15, 18, 0.98); padding: 2.5rem; border-radius: 24px;
            max-width: 500px; width: 90%; text-align: center; border: 2px solid #ff8c00;
            box-shadow: 0 0 50px rgba(255, 140, 0, 0.25);
        }
        .hidden { display: none !important; }
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #hud-bottom { 
            position: absolute; bottom: 30px; left: 30px; font-family: 'Courier New', monospace; 
            color: #ff8c00; background: rgba(0,0,0,0.85); padding: 20px; border-radius: 12px; border-left: 5px solid #ff8c00;
        }
        .world-item {
            background: #1e1e1e; padding: 15px; border-radius: 12px; cursor: pointer; margin-bottom: 12px;
            border: 1px solid #333; text-align: left; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .world-item:hover { border-color: #ff8c00; background: #2a2a2a; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,140,0,0.2); }
        #warning-text { color: #ff4444; font-weight: bold; font-size: 1.2rem; text-shadow: 0 0 10px red; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.1; } }
        .text-orange-glow { color: #ff8c00; text-shadow: 0 0 15px rgba(255,140,0,0.6); }
        
        .name-input {
            width: 100%; background: #111; border: 1px solid #444; padding: 12px;
            border-radius: 8px; color: #ff8c00; font-weight: bold; text-align: center;
            margin-bottom: 20px; font-size: 1.1rem; outline: none;
        }
        .name-input:focus { border-color: #ff8c00; box-shadow: 0 0 10px rgba(255,140,0,0.3); }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <div id="hud" class="hidden">
        <div style="position:absolute; top:40px; width:100%; text-align:center;">
            <div id="warning-text">系統鎖定中 [請按 空白鍵 解鎖]</div>
        </div>
        <div id="hud-bottom">
            <div id="hud-world-name" style="font-weight:bold; font-size:1.4em; color: white; margin-bottom: 5px;">一甲國小練習生</div>
            <div class="flex justify-between w-44"><span>高度 (ALT):</span> <span id="hud-alt" class="font-bold">0.0</span>m</div>
            <div class="flex justify-between w-44"><span>油門 (THR):</span> <span id="hud-thr" class="font-bold">0</span>%</div>
            <div class="mt-2 text-xs" style="color: #666;">座標: <span id="hud-pos">0, 0, 0</span></div>
            <div id="xray-indicator" class="mt-1 text-[10px] text-blue-400 hidden">透視模式已啟動</div>
        </div>
    </div>

    <div id="ui-start" class="ui-layer">
        <div class="panel">
            <h1 class="text-3xl font-black mb-2 text-orange-glow">無人機 Minecraft 世界探索</h1>
            <p class="text-gray-500 text-sm mb-6 italic">探索無限可能的方塊世界</p>
            
            <div class="text-left text-xs text-gray-400 mb-2 ml-1 uppercase tracking-widest font-bold">Pilot Name / 飛行員姓名</div>
            <input type="text" id="player-name-input" class="name-input" value="一甲國小練習生" maxlength="15">
            
            <div id="world-list" class="max-h-64 overflow-y-auto pr-2">
                <div class="world-item" onclick="startWithDefault()">
                    <div class="font-bold text-orange-400">進入練習場探索</div>
                    <div class="text-xs text-gray-500">此地圖已建造一座螺旋梯木塔供您飛行挑戰</div>
                </div>
            </div>
            
            <button id="btn-open" class="mt-4 text-xs text-gray-600 hover:text-orange-400 transition-colors">
                [進階功能] 載入 Minecraft Saves
            </button>
        </div>
    </div>

    <script>
        // --- 核心變數 ---
        let scene, camera, renderer, worldGroup, drone;
        let propellers = [], lights = [], nameLabels = [];
        let gameState = 'START', isArmed = false;
        let terrainChunks = new Map();
        let studentName = "一甲國小練習生";

        const clock = new THREE.Clock();
        const input = { roll: 0, pitch: 0, yaw: 0, throttle: 0 };
        const keys = {};
        let playerYaw = Math.PI;
        let playerVel = new THREE.Vector3();

        const CHUNK_SIZE = 16;

        // --- 方塊材質 ---
        const materials = {
            grass: new THREE.MeshLambertMaterial({ color: 0x4caf50, transparent: true, opacity: 1.0 }),
            dirt: new THREE.MeshLambertMaterial({ color: 0x795548, transparent: true, opacity: 1.0 }),
            stone: new THREE.MeshLambertMaterial({ color: 0x9e9e9e, transparent: true, opacity: 1.0 }),
            water: new THREE.MeshLambertMaterial({ color: 0x2196f3, transparent: true, opacity: 0.65 }),
            wood: new THREE.MeshLambertMaterial({ color: 0x4e342e, transparent: true, opacity: 1.0 }),
            leaf: new THREE.MeshLambertMaterial({ color: 0x2e7d32, transparent: true, opacity: 1.0 }),
            flower: new THREE.MeshLambertMaterial({ color: 0xff4081 }),
            cloud: new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.7 })
        };

        const noise = (x, z) => {
            return (Math.sin(x * 0.12) * Math.cos(z * 0.12) * 6) + 
                   (Math.sin(x * 0.04) * 12) + 
                   (Math.cos(z * 0.02) * 18);
        };

        function initThree() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000); 
            scene.fog = new THREE.FogExp2(0x000000, 0.012);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1500);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('game-container').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.25));
            const sun = new THREE.DirectionalLight(0xffffff, 0.7);
            sun.position.set(40, 100, 40);
            scene.add(sun);

            worldGroup = new THREE.Group();
            scene.add(worldGroup);

            // --- 無人機物件生成函數 (用於玩家與裝飾) ---
            function createDroneObject(isStatic = false) {
                const group = new THREE.Group();
                const orangeMat = new THREE.MeshStandardMaterial({
                    color: 0xff8c00, emissive: 0xff4500, emissiveIntensity: 0.8,
                    roughness: 0.3, metalness: 0.7
                });
                const core = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.2, 0.45), orangeMat);
                const cage = new THREE.Mesh(
                    new THREE.IcosahedronGeometry(0.75, 1), 
                    new THREE.MeshStandardMaterial({color: 0xff8c00, wireframe: true, transparent: true, opacity: 0.4, emissive: 0xff8c00, emissiveIntensity: 1})
                );
                group.add(core, cage);
                
                const pGeo = new THREE.BoxGeometry(0.5, 0.02, 0.06);
                const pMat = new THREE.MeshStandardMaterial({color: 0x111111});
                const props = [];
                [[0.45, 0.1, 0.45], [-0.45, 0.1, 0.45], [0.45, 0.1, -0.45], [-0.45, 0.1, -0.45]].forEach(pos => {
                    const p = new THREE.Mesh(pGeo, pMat);
                    p.position.set(...pos);
                    group.add(p);
                    props.push(p);
                });

                const createLight = (color, pos) => {
                    const lGroup = new THREE.Group();
                    const l = new THREE.PointLight(color, 6, 4);
                    const m = new THREE.Mesh(new THREE.SphereGeometry(0.07), new THREE.MeshBasicMaterial({color: color}));
                    lGroup.add(l, m); lGroup.position.set(...pos);
                    group.add(lGroup); return { group: lGroup, light: l, mesh: m };
                };
                
                const droneLights = [];
                droneLights.push(createLight(0x0088ff, [0.4, 0, 0.5]));
                droneLights.push(createLight(0x0088ff, [-0.4, 0, 0.5]));
                droneLights.push(createLight(0xff0000, [0.4, 0, -0.5]));
                droneLights.push(createLight(0xff0000, [-0.4, 0, -0.5]));

                return { group, props, droneLights };
            }

            // 初始化玩家無人機
            const droneData = createDroneObject();
            drone = droneData.group;
            propellers = droneData.props;
            lights = droneData.droneLights;
            scene.add(drone);
            drone.visible = false;

            // 建立木塔與螺旋梯
            buildWoodenTower();
        }

        // --- 建造木塔函數 ---
        function buildWoodenTower() {
            const towerGroup = new THREE.Group();
            const startX = 15, startZ = 15;
            const towerH = 40;
            const towerSize = 10;
            
            // 1. 四支大柱子
            const pillarGeo = new THREE.BoxGeometry(1, towerH, 1);
            const corners = [
                [startX, towerH/2, startZ],
                [startX + towerSize, towerH/2, startZ],
                [startX, towerH/2, startZ + towerSize],
                [startX + towerSize, towerH/2, startZ + towerSize]
            ];
            corners.forEach(pos => {
                const p = new THREE.Mesh(pillarGeo, materials.wood);
                p.position.set(...pos);
                towerGroup.add(p);
            });

            // 2. 螺旋梯
            const stepGeo = new THREE.BoxGeometry(3, 0.5, 1.2);
            const stepsCount = 100;
            for(let i = 0; i < stepsCount; i++) {
                const angle = i * 0.25;
                const radius = 3.5;
                const step = new THREE.Mesh(stepGeo, materials.wood);
                // 繞中心點螺旋上升
                step.position.set(
                    startX + towerSize/2 + Math.cos(angle) * radius,
                    i * (towerH / stepsCount),
                    startZ + towerSize/2 + Math.sin(angle) * radius
                );
                step.rotation.y = -angle;
                towerGroup.add(step);
            }

            // 3. 頂部大木方間 (20x20x8)
            const roomSize = 20;
            const roomHeight = 8;
            const roomY = towerH + roomHeight/2;
            const roomX = startX + towerSize/2;
            const roomZ = startZ + towerSize/2;

            // 地板與天花板
            const floorGeo = new THREE.BoxGeometry(roomSize, 1, roomSize);
            const floor = new THREE.Mesh(floorGeo, materials.wood);
            floor.position.set(roomX, towerH, roomZ);
            towerGroup.add(floor);

            const ceiling = new THREE.Mesh(floorGeo, materials.wood);
            ceiling.position.set(roomX, towerH + roomHeight, roomZ);
            towerGroup.add(ceiling);

            // 四周木條牆 (每間隔5單位一條)
            const barGeo = new THREE.BoxGeometry(0.6, roomHeight, 0.6);
            for(let i = -roomSize/2; i <= roomSize/2; i += 5) {
                // 北牆 & 南牆
                const barN = new THREE.Mesh(barGeo, materials.wood);
                barN.position.set(roomX + i, towerH + roomHeight/2, roomZ - roomSize/2);
                towerGroup.add(barN);

                const barS = new THREE.Mesh(barGeo, materials.wood);
                barS.position.set(roomX + i, towerH + roomHeight/2, roomZ + roomSize/2);
                towerGroup.add(barS);

                // 東牆 & 西牆
                const barE = new THREE.Mesh(barGeo, materials.wood);
                barE.position.set(roomX + roomSize/2, towerH + roomHeight/2, roomZ + i);
                towerGroup.add(barE);

                const barW = new THREE.Mesh(barGeo, materials.wood);
                barW.position.set(roomX - roomSize/2, towerH + roomHeight/2, roomZ + i);
                towerGroup.add(barW);
            }

            // 4. 中央停放兩台同款無人機
            const drone1 = createDroneDecoration(roomX - 4, towerH + 2.5, roomZ);
            const drone2 = createDroneDecoration(roomX + 4, towerH + 8.5, roomZ);
            towerGroup.add(drone1, drone2);

            scene.add(towerGroup);
        }

        // 輔助函數：建立裝飾用的無人機
        function createDroneDecoration(x, y, z) {
            const group = new THREE.Group();
            const orangeMat = new THREE.MeshStandardMaterial({ color: 0xff8c00 });
            const core = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.2, 0.45), orangeMat);
            const cage = new THREE.Mesh(new THREE.IcosahedronGeometry(0.75, 1), new THREE.MeshStandardMaterial({color: 0xff8c00, wireframe: true, transparent: true, opacity: 0.3}));
            group.add(core, cage);
            group.position.set(x, y, z);
            return group;
        }

        function createNameLabel(name, position) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1024; canvas.height = 256;
            const gradient = ctx.createLinearGradient(0, 0, 1024, 0);
            gradient.addColorStop(0, "#ff8c00"); gradient.addColorStop(0.5, "#ff00ff"); gradient.addColorStop(1, "#00ffff");
            ctx.font = "Bold 140px 'Segoe UI', 'Microsoft JhengHei', sans-serif";
            ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.strokeStyle = "rgba(0,0,0,0.8)"; ctx.lineWidth = 15;
            ctx.strokeText(name, 512, 128);
            ctx.fillStyle = gradient; ctx.fillText(name, 512, 128);
            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const sprite = new THREE.Sprite(material);
            sprite.scale.set(40, 10, 1); sprite.position.copy(position);
            scene.add(sprite); return sprite;
        }

        function spawnWorldLabels() {
            studentName = document.getElementById('player-name-input').value || "一甲國小練習生";
            document.getElementById('hud-world-name').innerText = studentName;
            const dist = 120, height = 40;
            nameLabels.push(createNameLabel(studentName, new THREE.Vector3(dist, height, 0)));
            nameLabels.push(createNameLabel(studentName, new THREE.Vector3(-dist, height, 0)));
            nameLabels.push(createNameLabel(studentName, new THREE.Vector3(0, height, dist)));
            nameLabels.push(createNameLabel(studentName, new THREE.Vector3(0, height, -dist)));
        }

        function createTree(x, y, z, group) {
            for(let i=0; i<4; i++) {
                const trunk = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), materials.wood);
                trunk.position.set(x, y + i, z); group.add(trunk);
            }
            for(let ox=-1; ox<=1; ox++) for(let oz=-1; oz<=1; oz++) for(let oy=3; oy<=5; oy++) {
                if(ox===0 && oz===0 && oy===3) continue;
                const leaf = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), materials.leaf);
                leaf.position.set(x+ox, y+oy, z+oz); group.add(leaf);
            }
        }

        function generateChunk(cx, cz) {
            const key = `${cx},${cz}`;
            if (terrainChunks.has(key)) return;
            const group = new THREE.Group();
            const boxGeo = new THREE.BoxBufferGeometry(1, 1, 1);
            const grassMesh = new THREE.InstancedMesh(boxGeo, materials.grass, CHUNK_SIZE * CHUNK_SIZE);
            const dirtMesh = new THREE.InstancedMesh(boxGeo, materials.dirt, CHUNK_SIZE * CHUNK_SIZE * 3);
            const stoneMesh = new THREE.InstancedMesh(boxGeo, materials.stone, CHUNK_SIZE * CHUNK_SIZE * 6);
            const waterMesh = new THREE.InstancedMesh(boxGeo, materials.water, CHUNK_SIZE * CHUNK_SIZE);
            const dummy = new THREE.Object3D();
            let dirtIdx = 0, stoneIdx = 0, waterIdx = 0;

            for(let x=0; x<CHUNK_SIZE; x++) {
                for(let z=0; z<CHUNK_SIZE; z++) {
                    const wx = cx * CHUNK_SIZE + x;
                    const wz = cz * CHUNK_SIZE + z;
                    let h = Math.floor(noise(wx, wz)) + 5;
                    if (h < 6) {
                        for(let y=h; y<=6; y++) {
                            dummy.position.set(wx, y, wz); dummy.updateMatrix();
                            waterMesh.setMatrixAt(waterIdx++, dummy.matrix);
                        }
                    }
                    const isCave = (y) => y < h-3 && y > h-10 && Math.sin(wx*0.45)+Math.cos(wz*0.45)+Math.sin(y*0.45)>1.3;
                    if(!isCave(h)) {
                        dummy.position.set(wx, h, wz); dummy.updateMatrix();
                        grassMesh.setMatrixAt(x * CHUNK_SIZE + z, dummy.matrix);
                        if(h >= 6 && Math.random() < 0.01) createTree(wx, h+1, wz, group);
                    }
                    for(let y = h-1; y > h-12; y--) {
                        if(isCave(y)) continue;
                        dummy.position.set(wx, y, wz); dummy.updateMatrix();
                        if(y > h-4) dirtMesh.setMatrixAt(dirtIdx++, dummy.matrix);
                        else stoneMesh.setMatrixAt(stoneIdx++, dummy.matrix);
                    }
                }
            }
            group.add(grassMesh, dirtMesh, stoneMesh, waterMesh);
            worldGroup.add(group); terrainChunks.set(key, group);
        }

        function startWithDefault() {
            spawnWorldLabels();
            document.getElementById('ui-start').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            gameState = 'FLYING';
            drone.visible = true;
            drone.position.set(0, 25, 0);
        }

        window.onkeydown = (e) => {
            keys[e.code] = true;
            if(e.code === 'Space' && gameState === 'FLYING') {
                isArmed = !isArmed;
                document.getElementById('warning-text').classList.toggle('hidden', isArmed);
            }
        };
        window.onkeyup = (e) => keys[e.code] = false;

        function updateDrone(dt, time) {
            if(!isArmed) {
                drone.position.y = Math.max(drone.position.y - 12 * dt, -5);
                drone.rotation.x *= 0.94; drone.rotation.z *= 0.94;
                return;
            }

            if(keys['ArrowLeft']) input.roll = THREE.MathUtils.lerp(input.roll, -1, 0.1);
            else if(keys['ArrowRight']) input.roll = THREE.MathUtils.lerp(input.roll, 1, 0.1);
            else input.roll = THREE.MathUtils.lerp(input.roll, 0, 0.12);

            if(keys['ArrowUp']) input.pitch = THREE.MathUtils.lerp(input.pitch, 1, 0.1);
            else if(keys['ArrowDown']) input.pitch = THREE.MathUtils.lerp(input.pitch, -1, 0.1);
            else input.pitch = THREE.MathUtils.lerp(input.pitch, 0, 0.12);

            if(keys['KeyA']) input.yaw = 1; else if(keys['KeyD']) input.yaw = -1; else input.yaw = 0;
            if(keys['KeyW']) input.throttle = Math.min(100, input.throttle + 2.5);
            if(keys['KeyS']) input.throttle = Math.max(0, input.throttle - 2.5);

            playerYaw += input.yaw * dt * 2.8;
            drone.rotation.y = playerYaw;
            drone.rotation.x = input.pitch * 0.45;
            drone.rotation.z = -input.roll * 0.45;

            const moveDir = new THREE.Vector3(input.roll, 0, -input.pitch).applyAxisAngle(new THREE.Vector3(0,1,0), playerYaw);
            playerVel.add(moveDir.multiplyScalar(dt * 35));
            playerVel.y += (input.throttle - 50) * dt * 0.6;
            playerVel.multiplyScalar(0.955);
            drone.position.add(playerVel.clone().multiplyScalar(dt));
            propellers.forEach(p => p.rotation.y += dt * 50);

            const isBlinkOn = Math.floor(time * 4) % 2 === 0;
            lights.forEach(l => {
                l.light.intensity = isBlinkOn ? 7 : 0.4;
                l.mesh.material.opacity = isBlinkOn ? 1 : 0.2;
            });

            const groundH = Math.floor(noise(drone.position.x, drone.position.z)) + 5;
            const isUnderground = drone.position.y < groundH + 0.5;
            const targetOpacity = isUnderground ? 0.5 : 1.0;
            ['grass','dirt','stone','wood','leaf'].forEach(m => materials[m].opacity = THREE.MathUtils.lerp(materials[m].opacity, targetOpacity, 0.1));
            document.getElementById('xray-indicator').classList.toggle('hidden', !isUnderground);

            nameLabels.forEach((label, i) => { label.position.y = 40 + Math.sin(time + i) * 2; });
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.1);
            const time = clock.getElapsedTime();
            if(gameState === 'FLYING') {
                updateDrone(dt, time);
                const cx = Math.floor(drone.position.x / CHUNK_SIZE);
                const cz = Math.floor(drone.position.z / CHUNK_SIZE);
                for(let ix=-2; ix<=2; ix++) for(let iz=-2; iz<=2; iz++) generateChunk(cx+ix, cz+iz);
                const camOffset = new THREE.Vector3(0, 3.5, 7.5).applyAxisAngle(new THREE.Vector3(0,1,0), playerYaw);
                camera.position.lerp(drone.position.clone().add(camOffset), 0.12);
                camera.lookAt(drone.position);
                document.getElementById('hud-alt').innerText = drone.position.y.toFixed(1);
                document.getElementById('hud-thr').innerText = Math.round(input.throttle);
                document.getElementById('hud-pos').innerText = `${Math.round(drone.position.x)}, ${Math.round(drone.position.y)}, ${Math.round(drone.position.z)}`;
            }
            renderer.render(scene, camera);
        }

        window.onload = () => { initThree(); animate(); };
        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
